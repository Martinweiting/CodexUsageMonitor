name: build-and-release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - ARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure
        run: cmake -S . -B build-${{ matrix.arch }} -G "Visual Studio 17 2022" -A ${{ matrix.arch }} -DAPP_VERSION="${{ github.ref_name }}"

      - name: Build Release
        run: cmake --build build-${{ matrix.arch }} --config Release

      - name: Prepare artifact
        shell: powershell
        run: |
          $outDir = "artifacts/${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          Copy-Item "build-${{ matrix.arch }}/Release/CodexUsageMonitor.exe" "$outDir/CodexUsageMonitor-${{ matrix.arch }}.exe"
          Copy-Item "README.md" "$outDir/README.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexUsageMonitor-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: CodexUsageMonitor-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/CodexUsageMonitor-x64.exe
            release-assets/CodexUsageMonitor-ARM64.exe
